name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo. The token gets no write scopes.
permissions:
  contents: read

jobs:
  build:
    name: Build & test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Fail the build if the committed gradle-wrapper.jar doesn't match a known
      # good Gradle release (defends against a tampered wrapper executing in CI).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        shell: bash
        run: ./gradlew :core:test :swing:test :platform:test :gdx-desktop:classes --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          # Multi-module build: reports land under each module (core/, swing/,
          # platform/, …), not the repo root. Glob across modules so results
          # actually upload instead of "No files were found".
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
