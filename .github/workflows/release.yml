name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# The only job publishes assets to a GitHub Release, which needs write access
# to repository contents. Nothing else is granted to the token.
permissions:
  contents: write

jobs:
  installer:
    name: Build installer on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: BlackJackPro-*.msi
          - os: macos-latest
            artifact: BlackJackPro-*.dmg
          - os: ubuntu-latest
            artifact: blackjackpro_*.deb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install WiX (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          choco install wixtoolset -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Bootstrap Gradle wrapper if missing
        shell: bash
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.10
          fi

      - name: Build installer
        shell: bash
        run: ./gradlew :swing:jpackage -Pjpackage --no-daemon

      - name: Locate artifact
        id: locate
        shell: bash
        run: |
          set -e
          # Beryx places installers in build/jpackage/
          file=$(ls build/jpackage/${{ matrix.artifact }} 2>/dev/null | head -n1 || true)
          if [ -z "$file" ]; then
            echo "No artifact matched ${{ matrix.artifact }} in build/jpackage/"
            ls -la build/jpackage/ || true
            exit 1
          fi
          echo "artifact=$file" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ steps.locate.outputs.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
