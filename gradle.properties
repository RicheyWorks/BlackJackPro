# Point Gradle's Java toolchain at the locally installed JDK 21 so the
# Java-21 toolchain (core, swing, gdx-*) resolves without relying on
# toolchain auto-download. Forward slashes are intentional and work on Windows.
#
# If you move or upgrade your JDK, update this path (comma-separate multiple).
org.gradle.java.installations.paths=C:/Program Files/Java/jdk-21.0.4
org.gradle.java.installations.auto-detect=true
